name: Build Tauri App

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          #- platform: 'macos-13'
          #  args: '--target x86_64-apple-darwin'
          #  target: 'x86_64-apple-darwin'
          - platform: 'macos-14'
            args: '--target aarch64-apple-darwin'
            target: 'aarch64-apple-darwin'
          - platform: 'windows-latest'
            args: ''
            target: 'x86_64-pc-windows-msvc'
          #- platform: 'ubuntu-22.04'
          #  args: ''
          #  target: 'x86_64-unknown-linux-gnu'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller openpyxl

      - name: Compile Python Sidecars
        shell: bash
        run: |
          # The script handles building both save_pandetta and save_sterlink
          # and naming them correctly for the target platform
          python3 src-tauri/python/build_binaries.py ${{ matrix.target }}
          
          # Verify the generated binaries
          echo "Generated binaries in src-tauri/binaries:"
          ls -R src-tauri/binaries

      - name: Build the Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: 'TekReportPro ${{ github.ref_name }}'
          includeUpdaterJson: true
          releaseBody: |
            ## TekReportPro ${{ github.ref_name }}

            Scarica l'installer per il tuo sistema operativo:
            - **Windows**: `.msi` o `.exe`
            - **macOS (Apple Silicon)**: `.dmg` (aarch64)
            - **macOS (Intel)**: `.dmg` (x86_64)
            - **Linux**: `.AppImage` o `.deb`
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  generate-updater-manifest:
    needs: build-tauri
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate and upload updater JSON
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const tag = context.ref.replace('refs/tags/', '');
            
            console.log(`Fetching release for tag: ${tag}`);
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner,
              repo,
              tag,
            });
            
            const manifest = {
              version: tag.replace(/^v/, ''),
              notes: release.body || '',
              pub_date: release.published_at,
              platforms: {}
            };
            
            const assets = release.assets;
            console.log(`Found ${assets.length} assets`);
            
            const sigAssets = assets.filter(a => a.name.endsWith('.sig'));
            
            for (const sigAsset of sigAssets) {
              const binaryName = sigAsset.name.replace('.sig', '');
              const binaryAsset = assets.find(a => a.name === binaryName);
              
              if (!binaryAsset) {
                console.log(`No binary found for signature ${sigAsset.name}`);
                continue;
              }
              
              console.log(`Downloading signature for ${binaryName}`);
              const res = await fetch(sigAsset.browser_download_url);
              const signature = (await res.text()).trim();
              
              let platform = '';
              if (binaryName.includes('aarch64') && (binaryName.endsWith('.app.tar.gz') || binaryName.endsWith('.dmg') || binaryName.endsWith('.zip'))) {
                platform = 'darwin-aarch64';
              } else if ((binaryName.includes('x64') || binaryName.includes('x86_64')) && (binaryName.endsWith('.app.tar.gz') || binaryName.endsWith('.dmg') || binaryName.endsWith('.zip'))) {
                platform = 'darwin-x86_64';
              } else if ((binaryName.includes('amd64') || binaryName.includes('x86_64')) && (binaryName.endsWith('.AppImage') || binaryName.endsWith('.deb') || binaryName.endsWith('.rpm') || binaryName.endsWith('.tar.gz'))) {
                platform = 'linux-x86_64';
              } else if (binaryName.includes('x64') && (binaryName.endsWith('.msi') || binaryName.endsWith('.exe') || binaryName.endsWith('.zip'))) {
                platform = 'windows-x86_64';
              }
              
              if (platform) {
                const isPreferred = binaryName.endsWith('.app.tar.gz') || binaryName.endsWith('.AppImage') || binaryName.endsWith('.msi');
                if (!manifest.platforms[platform] || isPreferred) {
                  manifest.platforms[platform] = {
                    signature,
                    url: binaryAsset.browser_download_url
                  };
                  console.log(`Added platform ${platform} (${binaryName})`);
                } else {
                  console.log(`Skipped ${binaryName} for ${platform} as preferred asset is already set`);
                }
              } else {
                console.log(`Could not map ${binaryName} to a platform`);
              }
            }
            
            const fs = require('fs');
            const manifestJson = JSON.stringify(manifest, null, 2);
            fs.writeFileSync('latest.json', manifestJson);
            console.log('Manifest content:', manifestJson);
            
            const fileData = fs.readFileSync('latest.json');
            
            const existingAsset = assets.find(a => a.name === 'latest.json');
            if (existingAsset) {
              console.log(`Deleting existing latest.json (ID: ${existingAsset.id})`);
              await github.rest.repos.deleteReleaseAsset({
                owner,
                repo,
                asset_id: existingAsset.id
              });
            }
            
            console.log('Uploading latest.json');
            await github.rest.repos.uploadReleaseAsset({
              owner,
              repo,
              release_id: release.id,
              name: 'latest.json',
              data: fileData
            });
            console.log('Successfully uploaded latest.json');

